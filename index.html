<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Super Majzie Mo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="title-screen">
    <div id="title-bg"></div>
    <div id="title-rain"></div>

    <div id="title-content">
      <div class="title-eyebrow">SUPER</div>
      <div class="title-main">
        <span class="tl">M</span><span class="tl">A</span><span class="tl">J</span><span class="tl">Z</span><span class="tl">I</span><span class="tl">E</span> 
        <br>
        <span class="tl">M</span><span class="tl">O</span>
      </div>
      <button class="btn-primary" id="start-btn">ENTER WARRIOR</button>
    </div>
  </div>

  <div id="hud" style="display:none;">
    <div class="hud-top">
      <div class="hud-left">
        <div class="health-wrap">
          <div class="health-bg"><div id="health-bar"></div></div>
          <div class="lives-count" id="lives-display">❤❤❤</div>
        </div>
        <div class="score-wrap">
          <div id="score-val">000000</div>
          <div id="best-val">BEST: 0</div>
        </div>
      </div>
      <div class="hud-right">
        <div id="level-display">LEVEL 1</div>
        <div id="kill-progress">ENEMIES: 0 / 8</div>
      </div>
    </div>
    <div id="combo-ui" style="display:none;"><span id="combo-num">2</span>x COMBO</div>
  </div>

  <div class="overlay" id="pause-overlay" style="display:none;">
    <div class="overlay-box">
      <div class="overlay-title">PAUSED</div>
      <button class="btn-primary" id="resume-btn">RESUME</button>
    </div>
  </div>

  <div class="overlay" id="dead-overlay" style="display:none;">
    <div class="overlay-box">
      <div class="overlay-title color-blood">WASTED</div>
      <div class="overlay-sub" id="final-score">SCORE: 0</div>
      <button class="btn-primary" id="retry-btn">TRY AGAIN</button>
    </div>
  </div>

  <div class="overlay" id="clear-overlay" style="display:none;">
    <div class="overlay-box">
      <div class="overlay-title color-gold">LEVEL CLEAR</div>
      <div class="overlay-sub" id="lc-bonus">BONUS +5000</div>
      <button class="btn-primary" id="nextlevel-btn">NEXT LEVEL</button>
    </div>
  </div>

  <div id="mobile-controls">
    <button id="pause-btn" class="ctrl-pause" aria-label="Pause">⏸</button>

    <div class="ctrl-row">
      <div class="dpad">
        <button class="ctrl-btn dpad-up"    data-key="ArrowUp"    aria-label="Jump">▲</button>
        <button class="ctrl-btn dpad-left"  data-key="ArrowLeft"  aria-label="Left">◀</button>
        <button class="ctrl-btn dpad-right" data-key="ArrowRight" aria-label="Right">▶</button>
      </div>

      <div class="actions">
        <div class="ctrl-wrap">
          <button class="ctrl-btn act-special" data-key="KeyC" aria-label="Special">⚡</button>
          <span class="ctrl-label">SPECIAL</span>
        </div>
        <div class="ctrl-wrap">
          <button class="ctrl-btn act-kick"    data-key="KeyX" aria-label="Kick">💥</button>
          <span class="ctrl-label">KICK</span>
        </div>
        <div class="ctrl-wrap">
          <button class="ctrl-btn act-punch"   data-key="KeyZ" aria-label="Punch">👊</button>
          <span class="ctrl-label">PUNCH</span>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
