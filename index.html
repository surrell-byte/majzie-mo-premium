<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Super Majzie Mo - Final</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Oswald:wght@700&display=swap');

  * {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    touch-action: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Russo One', sans-serif;
    margin: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    touch-action: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100svh;
    object-fit: contain;
    background: #000;
  }

  /* TITLE SCREEN */
  #title-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.8s ease;
  }

  #title-bg {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
      url('./assets/bg/poster.jpg?v=3') center 30% / cover no-repeat;
    z-index: -1;
  }

  .rain-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.3;
    z-index: 1;
    pointer-events: none;
  }

  .fire-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 200px;
    background: radial-gradient(circle at 50% 100%, rgba(255,80,0,0.4), transparent 70%);
    pointer-events: none;
    z-index: 2;
  }

  .fire-container {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 200px;
    pointer-events: none;
    z-index: 2;
  }

  #character-layer {
    position: absolute;
    inset: 0;
    background: url('./assets/bg/poster.jpg?v=3') center 40% / cover no-repeat;
    transform: scale(1.1);
    z-index: 2;
    mask-image: linear-gradient(to top, transparent 0%, black 30%);
    -webkit-mask-image: linear-gradient(to top, transparent 0%, black 30%);
    pointer-events: none;
    will-change: transform;
  }

  #title-content {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #title-content::before {
    content: '';
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,80,0,0.4), transparent 70%);
    filter: blur(40px);
    z-index: -1;
    pointer-events: none;
  }

  .title-super {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(28px, 5vw, 60px);
    color: #ffcc33;
    text-shadow: 0 0 15px rgba(255,200,0,0.8), 0 2px 0 #5a3d00;
    letter-spacing: 10px;
    animation: titlePulse 2s ease-in-out infinite alternate;
    margin-bottom: -8px;
  }

  .title-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 14vw, 180px);
    letter-spacing: 6px;
    line-height: 0.85;
    position: relative;
    text-align: center;
  }

  .title-main span {
    display: inline-block;
    transform: translateY(-200px);
    opacity: 0;
    animation: dropIn 0.6s ease-out forwards;
    background: linear-gradient(180deg, #ff6a2a, #cc0000);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 6px 0px #2a0000, 0 10px 25px rgba(0,0,0,0.9);
  }

  /* Stagger + margin on E for space */
  .title-main span:nth-child(1) { animation-delay: 0.1s; }
  .title-main span:nth-child(2) { animation-delay: 0.15s; }
  .title-main span:nth-child(3) { animation-delay: 0.2s; }
  .title-main span:nth-child(4) { animation-delay: 0.25s; }
  .title-main span:nth-child(5) { animation-delay: 0.3s; }
  .title-main span:nth-child(6) { animation-delay: 0.35s; margin-right: 30px; }
  .title-main span:nth-child(7) { animation-delay: 0.45s; }
  .title-main span:nth-child(8) { animation-delay: 0.5s; }

  @keyframes dropIn {
    0% { transform: translateY(-200px) scale(1.2); opacity: 0; }
    70% { transform: translateY(20px) scale(0.95); opacity: 1; }
    100% { transform: translateY(0) scale(1); }
  }

  @keyframes titlePulse {
    from { text-shadow: 0 0 20px rgba(255,215,0,0.8), 2px 2px 0 #8B6914; }
    to { text-shadow: 0 0 40px rgba(255,215,0,1), 2px 2px 0 #8B6914, 0 0 80px rgba(255,165,0,0.6); }
  }

  .title-divider {
    width: 300px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #FF4400, #FFD700, #FF4400, transparent);
    margin: 12px auto;
    box-shadow: 0 0 15px rgba(255,100,0,0.8);
  }

  .title-tagline {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(11px, 2vw, 18px);
    color: #ccc;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  }

  .start-btn {
    margin-top: 40px;
    pointer-events: all;
    cursor: pointer;
    position: relative;
    padding: 16px 60px;
    background: linear-gradient(180deg, #ff6a2a, #cc2200);
    border: 1px solid rgba(255,150,0,0.4);
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 6px;
    color: #FFD700;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    box-shadow: 0 0 20px rgba(255,80,0,0.6), 0 6px 0 #5a1200, inset 0 2px 0 rgba(255,200,100,0.4);
    animation: btnPulse 1.5s ease-in-out infinite;
    transition: all 0.15s ease;
    backdrop-filter: blur(6px);
  }

  .start-btn:active { transform: translateY(4px) scale(0.98); }

  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 20px rgba(255,80,0,0.5); }
    50% { box-shadow: 0 0 50px rgba(255,80,0,0.9), 0 0 80px rgba(255,150,0,0.4); }
  }

  .controls-hint {
    margin-top: 18px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
  }

  #title-screen.shake { animation: screenShake 0.3s ease-in-out; }
  @keyframes screenShake {
    0% { transform: translate(0,0); }
    25% { transform: translate(-5px, 3px); }
    50% { transform: translate(5px, -3px); }
    75% { transform: translate(-3px, 2px); }
    100% { transform: translate(0,0); }
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    padding: 12px 20px;
    display: none;
    z-index: 50;
    pointer-events: none;
  }

  .hud-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    padding: 10px 16px 20px;
  }

  .hud-left, .hud-right { display: flex; flex-direction: column; gap: 6px; }
  .hud-right { align-items: flex-end; }
  .hud-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,215,0,0.7); font-family: 'Oswald', sans-serif; }
  .health-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .health-bar-bg { width: min(180px, 40vw); height: 14px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,80,0,0.5); clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); overflow: hidden; }
  #health-bar { height: 100%; background: linear-gradient(90deg, #FF2200, #FF6B35, #FFD700); width: 100%; transition: width 0.2s ease; }
  .hud-score { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.6); letter-spacing: 3px; }
  .hud-level { font-size: 13px; color: #FF6B35; letter-spacing: 4px; }
  .lives-display { display: flex; gap: 4px; align-items: center; }
  .life-icon { width: 16px; height: 16px; background: radial-gradient(circle, #FF6B35, #CC2200); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
  .life-icon.lost { background: rgba(255,100,0,0.2); }

  /* Overlay screens */
  .overlay-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 80;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }
  .overlay-box {
    text-align: center;
    padding: 50px 80px;
    background: linear-gradient(180deg, rgba(20,0,5,0.95), rgba(10,0,0,0.95));
    border: 1px solid rgba(255,80,0,0.5);
    clip-path: polygon(20px 0%, 100% 0%, calc(100% - 20px) 100%, 0% 100%);
  }
  .overlay-title { font-family: 'Bebas Neue', sans-serif; font-size: 72px; background: linear-gradient(180deg, #FF6B35, #CC0000); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .overlay-sub { font-size: 14px; color: rgba(255,200,100,0.7); letter-spacing: 4px; margin-top: 8px; }
  .overlay-btn { margin-top: 30px; padding: 12px 40px; background: linear-gradient(180deg, #FF6B35, #CC2200); border: none; clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%); font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: #FFD700; cursor: pointer; }

  /* MOBILE CONTROLS */
  #mobile-controls {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: env(safe-area-inset-left);
    right: env(safe-area-inset-right);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 16px;
    z-index: 1000;
    pointer-events: none;
  }
  .dpad {
    display: grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px;
    gap: 8px;
    pointer-events: auto;
  }
  .actions {
    display: flex;
    gap: 10px;
    pointer-events: auto;
    align-items: flex-end;
  }
  #mobile-controls button {
    width: 64px; height: 64px; font-size: 28px;
    border-radius: 50%; border: none;
    background: rgba(0,0,0,0.72);
    color: #FFD700;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 0 0 2px rgba(255,100,0,0.6), 0 4px 16px rgba(0,0,0,0.5);
    font-weight: bold; cursor: pointer;
    touch-action: manipulation;
    /* Bigger tap area without changing visual size */
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s, background 0.08s;
  }
  #mobile-controls button:active,
  #mobile-controls button.pressed {
    transform: scale(0.88);
    background: rgba(255,80,0,0.9);
    color: white;
    box-shadow: 0 0 0 2px rgba(255,180,0,0.9), 0 2px 8px rgba(0,0,0,0.5);
  }
  /* Label each action button */
  .btn-label {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,200,80,0.7);
    text-align: center;
    margin-top: 3px;
    pointer-events: none;
  }
  .action-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: auto;
  }
  /* Pause button top-right */
  #pause-btn {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    right: calc(12px + env(safe-area-inset-right));
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,100,0,0.4);
    color: #FFD700;
    font-size: 18px;
    display: none;
    align-items: center; justify-content: center;
    z-index: 1001;
    pointer-events: auto;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  /* Pause overlay */
  #pause-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 900;
  }
  #pause-screen .overlay-title { font-size: 80px; }
  #pause-screen .overlay-btn { margin-top: 20px; }

  @media (orientation: portrait) {
    /* Portrait mode: stack controls vertically, shrink canvas to fit */
    #mobile-controls {
      bottom: calc(30px + env(safe-area-inset-bottom));
      padding: 0 12px;
    }
    #mobile-controls button { width: 58px; height: 58px; font-size: 26px; }
    .dpad { gap: 10px; }
    .actions { gap: 10px; }
    /* Push game canvas up to leave room for controls */
    #game-canvas {
      height: calc(100vh - 180px) !important;
      margin-top: 0;
    }
  }

  @media (max-width: 600px) {
    .title-main { font-size: 64px; }
    .start-btn { padding: 14px 40px; font-size: 22px; margin-top: 24px; }
    #mobile-controls button { width: 58px; height: 58px; font-size: 26px; }
    #controls-hint { display: none; }
  }
</style>
</head>
<body>

<div id="title-screen">
  <div id="title-bg">
    <canvas class="rain-canvas" id="rain-canvas"></canvas>
    <div class="fire-overlay"></div>
    <div class="fire-container" id="fire-container"></div>
  </div>
  <div id="character-layer"></div>
  <div id="title-content">
    <div class="title-super">SUPER</div>
    <div class="title-main">
      <span>M</span><span>A</span><span>J</span><span>Z</span><span>I</span><span>E</span>
      <span>M</span><span>O</span>
    </div>
    <div class="title-divider"></div>
    <div class="title-tagline">Streets Don't Sleep &bull; Neither Does She</div>
    <button class="start-btn" id="start-btn">▶ START GAME</button>
    <div class="controls-hint" id="controls-hint">ARROW KEYS · Z = PUNCH · X = KICK · C = SPECIAL · P = PAUSE</div>
  </div>
</div>

<div id="hud">
  <div class="hud-inner">
    <div class="hud-left">
      <div class="hud-label">MAJZIE MO</div>
      <div class="health-bar-wrap"><div class="health-bar-bg"><div id="health-bar"></div></div><span id="hp-text" style="color:#FF6B35;font-size:11px;">100</span></div>
      <div class="lives-display" id="lives-display"><div class="life-icon"></div><div class="life-icon"></div><div class="life-icon"></div></div>
    </div>
    <div class="hud-right"><div class="hud-label">SCORE</div><div class="hud-score" id="score-display">000000</div><div class="hud-level" id="level-display">LEVEL 1</div></div>
  </div>
</div>

<canvas id="game-canvas"></canvas>

<div id="pause-btn" onclick="togglePause()">⏸</div>

<div id="mobile-controls">
  <div class="dpad">
    <button data-key="ArrowLeft">◀</button>
    <button data-key="ArrowRight">▶</button>
    <button data-key="ArrowUp">▲</button>
  </div>
  <div class="actions">
    <div class="action-wrap">
      <button data-key="KeyZ">👊</button>
      <span class="btn-label">PUNCH</span>
    </div>
    <div class="action-wrap">
      <button data-key="KeyX">💥</button>
      <span class="btn-label">KICK</span>
    </div>
    <div class="action-wrap">
      <button data-key="KeyC">⚡</button>
      <span class="btn-label">SPECIAL</span>
    </div>
  </div>
</div>

<div id="pause-screen">
  <div class="overlay-box">
    <div class="overlay-title">PAUSED</div>
    <button class="overlay-btn" onclick="togglePause()">RESUME</button>
    <button class="overlay-btn" style="margin-top:12px;background:linear-gradient(180deg,#555,#222)" onclick="restartGame()">QUIT</button>
  </div>
</div>

<div class="overlay-screen" id="gameover-screen"><div class="overlay-box"><div class="overlay-title">GAME OVER</div><div class="overlay-sub" id="final-score-text">SCORE: 000000</div><button class="overlay-btn" onclick="restartGame()">PLAY AGAIN</button></div></div>
<div class="overlay-screen" id="levelclear-screen"><div class="overlay-box"><div class="overlay-title">LEVEL CLEAR!</div><div class="overlay-sub" id="level-bonus-text">BONUS: +5000</div><button class="overlay-btn" onclick="nextLevel()">NEXT LEVEL</button></div></div>

<script>
// ========== iOS PULL-TO-REFRESH BLOCK ==========
document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) return; e.preventDefault(); }, { passive: false });

// ========== RAIN + FIRE + PARALLAX ==========
const rainCanvas = document.getElementById('rain-canvas'), rainCtx = rainCanvas.getContext('2d');
let rainDrops = [];
function initRain() { rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight; rainDrops = []; for (let i = 0; i < 180; i++) rainDrops.push({ x: Math.random() * rainCanvas.width, y: Math.random() * rainCanvas.height, len: Math.random() * 25 + 10, speed: Math.random() * 6 + 4, opacity: Math.random() * 0.4 + 0.1 }); }
function animateRain() { rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height); rainCtx.strokeStyle = 'rgba(120,160,255,0.4)'; rainCtx.lineWidth = 1.2; for (const d of rainDrops) { rainCtx.globalAlpha = d.opacity; rainCtx.beginPath(); rainCtx.moveTo(d.x, d.y); rainCtx.lineTo(d.x - d.len * 0.15, d.y + d.len); rainCtx.stroke(); d.y += d.speed; d.x -= d.speed * 0.15; if (d.y > rainCanvas.height) { d.y = -d.len; d.x = Math.random() * rainCanvas.width; } } rainCtx.globalAlpha = 1; if (titleVisible) requestAnimationFrame(animateRain); }
let titleVisible = true; initRain(); animateRain();

const fireContainer = document.getElementById('fire-container');
function spawnFireParticle() { const p = document.createElement('div'); const x = Math.random() * 100, size = Math.random() * 18 + 6, dur = Math.random() * 2 + 1; p.style.cssText = `position:absolute; bottom:0; left:${x}%; width:${size}px; height:${size}px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); background:radial-gradient(circle, #FFD700 0%, #FF6B35 50%, rgba(200,0,0,0) 100%); opacity:0.8; animation:fireRise ${dur}s ease-out forwards; pointer-events:none;`; fireContainer.appendChild(p); setTimeout(() => p.remove(), dur * 1000); }
const fireStyle = document.createElement('style'); fireStyle.textContent = `@keyframes fireRise { 0% { transform:rotate(-45deg) scale(1); opacity:0.8; bottom:0; } 100% { transform:rotate(-45deg) scale(0.2) translateY(-120px); opacity:0; bottom:80px; } }`; document.head.appendChild(fireStyle);
setInterval(() => { if (titleVisible) spawnFireParticle(); }, 60);
setTimeout(() => document.getElementById('title-screen')?.classList.add('shake'), 700);
const characterLayer = document.getElementById('character-layer');
if (characterLayer) {
  document.addEventListener('mousemove', (e) => { if (!titleVisible) return; const x = (e.clientX / window.innerWidth - 0.5) * 20, y = (e.clientY / window.innerHeight - 0.5) * 10; characterLayer.style.transform = `scale(1.1) translate(${x}px, ${y}px)`; });
  document.addEventListener('touchmove', (e) => { if (!titleVisible) return; const t = e.touches[0]; const x = (t.clientX / window.innerWidth - 0.5) * 15, y = (t.clientY / window.innerHeight - 0.5) * 8; characterLayer.style.transform = `scale(1.1) translate(${x}px, ${y}px)`; });
}

// ========== GAME ENGINE ==========
const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() { 
  canvas.width = window.innerWidth; 
  canvas.height = window.innerHeight; 
  W = canvas.width; 
  H = canvas.height;
  if (typeof player !== 'undefined' && player) {
    player.y = H - 100;
  }
}
window.addEventListener('resize', resizeCanvas); 
resizeCanvas();

let gameState = 'title', score = 0, lives = 3, level = 1, frameCount = 0, gameLoopId = null;
let bgScroll = 0, enemies = [], enemiesDefeated = 0, enemiesPerLevel = 8, enemiesSpawned = 0, spawnTimer = 0, effects = [];

const player = { 
  x: W * 0.25, y: H - 100, vx: 0, vy: 0, speed: 5, 
  health: 100, maxHealth: 100, 
  attacking: false, attackType: 'none', attackFrame: 0, attackDuration: 15, 
  invincible: false, invincibleTimer: 0, facingRight: true, 
  grounded: true, jumping: false, scale: window.innerWidth < 600 ? 1.4 : 1.8, hitFlash: 0 
};

// ========== SPRITE SHEET SETUP ==========
const spriteSheet1 = new Image();
const spriteSheet2 = new Image();
let spritesReady = 0;
spriteSheet1.onload = () => { spritesReady++; };
spriteSheet2.onload = () => { spritesReady++; };
spriteSheet1.src = 'majzie_sprites.jpeg';
spriteSheet2.src = '9cb61436-e956-43f0-bea7-de670796b352.jpeg';

// Sprite sheet 1 (majzie_sprites.jpeg) layout analysis:
// Sheet is ~790x980px. Header ~60px. Grid cells ~130x130px (left half = player, right half = enemies)
// Left half cols: x≈20,150,280 | Right half cols: x≈415,545,675
// Row heights ~130px, starting y≈70

// Each character has animation rows:
// MAJZIE (left half, col width ~130, row height ~130):
//   Row 0 (y≈70):  run frames 0,1,2
//   Row 1 (y≈200): run frames 3,4,5
//   Row 2 (y≈330): run frames 6,7,8  (3 rows of run = 9 run frames total, use 6)
//   Row 3 (y≈460): punch frame 0, kick frame 0, kick frame 1
//   Row 4 (y≈590): kick frame 2, special frame 0, special frame 1
//   Row 5 (y≈720): idle 0, idle 1, idle 2
//   Row 6 (y≈850): crouch/run 0, 1, 2

// BIG GUY (right half):
//   Row 0 (y≈70):  walk 0,1,2
//   Row 1 (y≈200): punch 0,1,2

// NINJA (right half):
//   Row 2 (y≈330): walk 0,1,2
//   Row 3 (y≈460): attack 0,1,2

// HOOD GUY (right half):
//   Row 4 (y≈590): walk 0,1,2 (with bat)
//   Row 5 (y≈720): attack 0, attack 1, crouch

// Sheet 2 (enemy expansion) layout:
// BIKER (red helmet):
//   Row 0 (y≈60):  walk 0,1,2 | whip 0,1,2
//   Row 1 (y≈190): punch 0,1,2 | punch 3,4,5
// PUNK (purple mohawk):
//   Row 2 (y≈320): walk 0,1,2 | knife 0,1,2
//   Row 3 (y≈450): kick 0,1,2  | knife attack 0,1,2
// BLACKOPS:
//   Row 4 (y≈580): kick 0,1,2 | attack 0,1, crouch
//   Row 5 (y≈710): walk 0,1,2 | ...

// Sprite dimensions per cell
const SW = 130; // sprite cell width
const SH = 130; // sprite cell height

// Sheet 1 column x-positions (3 cols per half)
const S1_LX = [18, 148, 278];   // left half (Majzie)
const S1_RX = [408, 538, 668];  // right half (enemies)
// Row y-positions
const S1_Y  = [65, 195, 325, 455, 585, 715, 845];

// Sheet 2 column x-positions (3 left, 3 right)
const S2_LX = [18, 148, 278];
const S2_RX = [408, 538, 668];
const S2_Y  = [55, 185, 315, 445, 575, 705];

// Helper: draw a sprite from a sheet, centered on (cx, cy), scaled to spriteH pixels tall
function drawSprite(sheet, sx, sy, cx, cy, targetH, facingRight, alpha=1) {
  if (!sheet.complete || sheet.naturalWidth === 0) return false;
  const scale = targetH / SH;
  const dw = SW * scale;
  const dh = SH * scale;
  ctx.save();
  ctx.globalAlpha *= alpha;
  if (!facingRight) {
    ctx.translate(cx, 0);
    ctx.scale(-1, 1);
    ctx.translate(-cx, 0);
  }
  // Draw centered: x anchor = center, y anchor = bottom
  ctx.drawImage(sheet, sx, sy, SW, SH, cx - dw/2, cy - dh, dw, dh);
  ctx.restore();
  return true;
}

// Animation frame selector — returns {sheet, sx, sy}
function getSpriteCoords(type, frame, attackType, attacking) {
  // Cycle through frames at game speed
  const runFrame = Math.floor(frame / 6) % 6; // 6 run frames
  const walkFrame = Math.floor(frame / 8) % 3;
  const attackFrame = Math.floor(frame / 5) % 3;

  if (type === 'majzie') {
    if (attacking) {
      if (attackType === 'punch') {
        // Row 3 col 0
        return { sheet: spriteSheet1, sx: S1_LX[0], sy: S1_Y[3] };
      } else if (attackType === 'kick') {
        const f = Math.floor(frame / 4) % 3;
        const cols = [1, 2, 0]; // row3[1], row3[2], row4[0]
        if (f < 2) return { sheet: spriteSheet1, sx: S1_LX[cols[f]], sy: S1_Y[3] };
        return { sheet: spriteSheet1, sx: S1_LX[0], sy: S1_Y[4] };
      } else { // special
        const f = Math.floor(frame / 4) % 2;
        return { sheet: spriteSheet1, sx: S1_LX[f+1], sy: S1_Y[4] };
      }
    }
    // Run animation — 6 frames across 2 rows
    if (runFrame < 3) return { sheet: spriteSheet1, sx: S1_LX[runFrame], sy: S1_Y[0] };
    return { sheet: spriteSheet1, sx: S1_LX[runFrame-3], sy: S1_Y[1] };
  }

  if (type === 'bigGuy') {
    if (attacking) return { sheet: spriteSheet1, sx: S1_RX[attackFrame], sy: S1_Y[1] };
    return { sheet: spriteSheet1, sx: S1_RX[walkFrame], sy: S1_Y[0] };
  }

  if (type === 'ninja') {
    if (attacking) return { sheet: spriteSheet1, sx: S1_RX[attackFrame], sy: S1_Y[3] };
    return { sheet: spriteSheet1, sx: S1_RX[walkFrame], sy: S1_Y[2] };
  }

  if (type === 'hoodGuy') {
    if (attacking) return { sheet: spriteSheet1, sx: S1_RX[Math.min(attackFrame,1)], sy: S1_Y[5] };
    return { sheet: spriteSheet1, sx: S1_RX[walkFrame], sy: S1_Y[4] };
  }

  if (type === 'biker') {
    if (attacking) return { sheet: spriteSheet2, sx: S2_RX[attackFrame], sy: S2_Y[0] };
    return { sheet: spriteSheet2, sx: S2_LX[walkFrame], sy: S2_Y[0] };
  }

  if (type === 'punk') {
    if (attacking) return { sheet: spriteSheet2, sx: S2_RX[attackFrame], sy: S2_Y[2] };
    return { sheet: spriteSheet2, sx: S2_LX[walkFrame], sy: S2_Y[2] };
  }

  if (type === 'blackOps') {
    if (attacking) return { sheet: spriteSheet2, sx: S2_RX[Math.min(attackFrame,1)], sy: S2_Y[4] };
    return { sheet: spriteSheet2, sx: S2_LX[walkFrame], sy: S2_Y[5] };
  }

  // Fallback: bigGuy
  return { sheet: spriteSheet1, sx: S1_RX[walkFrame], sy: S1_Y[0] };
}

// Sprite height targets (px on screen)
const SPRITE_H = { majzie: 110, bigGuy: 130, ninja: 110, hoodGuy: 110, biker: 115, punk: 108, blackOps: 112 };

function px(ctx, x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }

function drawPixelChar(ctx, cx, cy, s, type, frame, facingRight, attackType, attacking) {
  const coords = getSpriteCoords(type, frame, attackType, attacking);
  const h = (SPRITE_H[type] || 110) * (s / 1.4);
  const drawn = drawSprite(coords.sheet, coords.sx, coords.sy, cx, cy, h, facingRight);
  // Fallback to basic shape if sprites not loaded yet
  if (!drawn) {
    ctx.save();
    ctx.fillStyle = type === 'majzie' ? '#c8845a' : '#555';
    ctx.fillRect(cx - 12*s, cy - 50*s, 24*s, 50*s);
    ctx.restore();
  }
}

function drawBackground(ctx, sx){ ctx.fillStyle = '#060010'; ctx.fillRect(0,0,W,H); ctx.fillStyle = 'rgba(255,255,255,0.6)'; for(let i=0;i<80;i++){ let sxPos = ((i*137 + sx*0.1)%W+W)%W; ctx.fillRect(sxPos, (i*97)%(H*0.5), 1, 1); } }
function spawnEnemy(){
  // Mix original + expansion pack enemies. Higher levels bring harder foes.
  const baseTypes = ['bigGuy','ninja','hoodGuy'];
  const expandTypes = ['biker','punk','blackOps'];
  const pool = level >= 2 ? [...baseTypes, ...expandTypes] : baseTypes;
  const type = pool[Math.floor(Math.random() * pool.length)];
  const fromRight = Math.random() > 0.3;
  const isBig = type === 'bigGuy';
  const isElite = type === 'biker' || type === 'blackOps';
  enemies.push({
    x: fromRight ? W+80 : -80,
    y: H - 100,
    health: isBig ? 80 : isElite ? 65 : 50,
    maxHealth: isBig ? 80 : isElite ? 65 : 50,
    type,
    speed: isBig ? 1.2 : isElite ? 2.2 : 1.8,
    facingRight: !fromRight,
    attackTimer: Math.floor(Math.random()*120)+60,
    scale: isBig ? (W<600?1.2:1.6) : (W<600?1.1:1.4),
    hitFlash: 0, dying: false, dyingTimer: 0
  });
  enemiesSpawned++;
}

// ========== COMBAT & EFFECTS ==========
function triggerHaptic(ms=15) { if (navigator.vibrate) navigator.vibrate(ms); }
function addHitEffect(x,y,color){ for(let i=0;i<8;i++) effects.push({ x,y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*6-3, life:1, color, size:Math.random()*6+3 }); effects.push({ type:'text', x,y, vy:-2, life:1, text:['POW!','BAM!','CRACK!'][Math.floor(Math.random()*3)], color }); triggerHaptic(12); }
function addScorePopup(x,y,pts){ effects.push({ type:'score', x,y, vy:-1.5, life:1, text:`+${pts}` }); }
function updateHealthBar(){ const bar = document.getElementById('health-bar'), txt = document.getElementById('hp-text'); if(bar) bar.style.width = player.health + '%'; if(txt) txt.textContent = player.health; }
function updateHUD(){ document.getElementById('score-display').textContent = String(score).padStart(6,'0'); document.getElementById('level-display').textContent = `LEVEL ${level}`; const livesEl = document.getElementById('lives-display'); if(livesEl){ livesEl.innerHTML = ''; for(let li=0;li<3;li++){ const div = document.createElement('div'); div.className = 'life-icon' + (li>=lives?' lost':''); livesEl.appendChild(div); } } }
function updateEffects() { for (let i=effects.length-1; i>=0; i--) { const p = effects[i]; p.x += p.vx || 0; p.y += p.vy || 0; p.life -= 0.02; if (p.life <= 0) effects.splice(i,1); } }
function drawEffects(){ for(const ef of effects){ ctx.globalAlpha=ef.life; if(ef.type==='text'){ ctx.font=`bold ${Math.floor(22*(W/800))}px 'Bebas Neue'`; ctx.fillStyle=ef.color||'#FF6B35'; ctx.shadowBlur=15; ctx.fillText(ef.text,ef.x-20,ef.y); ctx.shadowBlur=0; }else if(ef.type==='score'){ ctx.font=`bold ${Math.floor(18*(W/800))}px 'Russo One'`; ctx.fillStyle='#FFD700'; ctx.fillText(ef.text,ef.x,ef.y); }else{ ctx.fillStyle=ef.color; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(ef.x,ef.y,ef.size*ef.life,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; } ctx.globalAlpha=1; } }
function drawEnemies(){ for(const e of enemies){ ctx.globalAlpha=e.dying?Math.max(0,1-e.dyingTimer/40):1; if(e.hitFlash>0&&e.hitFlash%3===0)ctx.filter='brightness(10) saturate(0)'; const isAttacking = e.attackTimer < 20; drawPixelChar(ctx,e.x,e.y,e.scale,e.type,frameCount,e.facingRight,'punch',isAttacking); ctx.filter='none'; if(!e.dying&&e.health<e.maxHealth){ const bw=40*e.scale, bx=e.x-bw/2, by=e.y-60*e.scale; ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx,by,bw,5); ctx.fillStyle='#FF2200'; ctx.fillRect(bx,by,bw*(e.health/e.maxHealth),5); } ctx.globalAlpha=1; } }
function drawPlayer(){ if(player.invincible&&player.invincibleTimer%4<2)ctx.globalAlpha=0.5; if(player.hitFlash>0&&player.hitFlash%3===0)ctx.filter='brightness(10) saturate(0) sepia(1)'; const animFrame=player.attacking?player.attackFrame*2:frameCount; drawPixelChar(ctx,player.x,player.y,player.scale,'majzie',animFrame,player.facingRight,player.attackType,player.attacking); if(player.attacking&&player.attackType==='special'){ ctx.globalAlpha=(1-player.attackFrame/player.attackDuration)*0.5; ctx.fillStyle='#00FFFF'; ctx.shadowBlur=30; ctx.beginPath(); ctx.arc(player.x,player.y-20,60,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1; } ctx.filter='none'; ctx.globalAlpha=1; }

function updateEnemies() {
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dying) { e.dyingTimer++; if (e.dyingTimer > 40) enemies.splice(i,1); continue; }
    if (e.hitFlash > 0) e.hitFlash--;
    const dx = player.x - e.x, dist = Math.abs(dx), range = e.type === 'bigGuy' ? 60 : 45;
    if (dist > range) { e.x += Math.sign(dx) * e.speed; e.facingRight = dx > 0; }
    e.attackTimer--;
    if (e.attackTimer <= 0 && dist < range+20 && !player.invincible) {
      const dmg = e.type === 'bigGuy' ? 15 : 10;
      player.health = Math.max(0, player.health - dmg);
      player.hitFlash = 15; player.invincible = true; player.invincibleTimer = 60;
      triggerHaptic(30); updateHealthBar();
      if (player.health <= 0) onPlayerDeath();
      e.attackTimer = 100 + Math.random() * 50;
    }
    if (player.attacking && player.attackFrame === 5) {
      const hitRange = player.attackType === 'kick' ? 90 : 70;
      if (dist < hitRange && ((player.facingRight && dx > 0) || (!player.facingRight && dx < 0))) {
        const dmg = player.attackType === 'kick' ? 20 : (player.attackType === 'special' ? 35 : 12);
        e.health -= dmg; e.hitFlash = 10;
        e.x += player.facingRight ? 15 : -15;
        addHitEffect(e.x, e.y - 40 * e.scale, '#FFD700');
        if (e.health <= 0) {
          e.dying = true; e.dyingTimer = 0;
          const pts = e.type === 'bigGuy' ? 500 : 300;
          score += pts; addScorePopup(e.x, e.y-60, pts); enemiesDefeated++;
          updateHUD();
          if (enemiesDefeated >= enemiesPerLevel && enemiesSpawned >= enemiesPerLevel) onLevelClear();
        }
      }
    }
    if (keys['ArrowRight'] && player.x >= W*0.7) e.x -= player.speed;
    if (keys['ArrowLeft'] && player.x <= 50) e.x += player.speed;
  }
}

function updatePlayer() {
  if (keys['ArrowLeft']) { player.vx = -player.speed; player.facingRight = false; }
  else if (keys['ArrowRight']) { player.vx = player.speed; player.facingRight = true; }
  else { player.vx *= 0.8; }
  player.x += player.vx;
  if (player.x > W * 0.7) { bgScroll += player.vx; player.x = W * 0.7; }
  if (player.x < 50) player.x = 50;
  if (!player.grounded) {
    player.vy += 0.8;
    player.y += player.vy;
    if (player.y >= H - 100) { player.y = H - 100; player.vy = 0; player.grounded = true; }
  }
  if (player.attacking) {
    player.attackFrame++;
    if (player.attackFrame >= player.attackDuration) { player.attacking = false; player.attackFrame = 0; }
  }
  if (player.invincible) { player.invincibleTimer--; if (player.invincibleTimer <= 0) player.invincible = false; }
  if (player.hitFlash > 0) player.hitFlash--;
}

// ========== GAME FLOW ==========
function onPlayerDeath() { lives--; updateHUD(); if (lives <= 0) { if(gameLoopId) cancelAnimationFrame(gameLoopId); document.getElementById('final-score-text').textContent = `FINAL SCORE: ${score}`; document.getElementById('gameover-screen').style.display = 'flex'; } else { player.health = 100; player.x = W * 0.2; updateHealthBar(); } }
function onLevelClear() { level++; enemiesDefeated = 0; enemiesSpawned = 0; enemiesPerLevel += 4; document.getElementById('level-bonus-text').textContent = `LEVEL ${level-1} COMPLETE! BONUS +5000`; score += 5000; updateHUD(); document.getElementById('levelclear-screen').style.display = 'flex'; if(gameLoopId) cancelAnimationFrame(gameLoopId); }
function nextLevel() { document.getElementById('levelclear-screen').style.display = 'none'; gameLoopId = requestAnimationFrame(gameLoop); }
function restartGame() { location.reload(); }

// ========== KEYS OBJECT ==========
const keys = {};

// ========== PAUSE LOGIC ==========
let paused = false;
function togglePause() {
  if (gameState !== 'playing') return;
  paused = !paused;
  const pauseScreen = document.getElementById('pause-screen');
  const pauseBtn = document.getElementById('pause-btn');
  if (paused) {
    pauseScreen.style.display = 'flex';
    pauseBtn.textContent = '▶';
    if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
  } else {
    pauseScreen.style.display = 'none';
    pauseBtn.textContent = '⏸';
    gameLoopId = requestAnimationFrame(gameLoop);
  }
}

// ========== START GAME FUNCTION ==========
function startGame() {
  // If sprites haven't loaded yet, wait briefly
  if (spritesReady < 2) {
    const loadMsg = document.createElement('div');
    loadMsg.style.cssText = 'position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;color:#FF6B35;font-family:Bebas Neue,sans-serif;font-size:32px;letter-spacing:6px;z-index:200;';
    loadMsg.textContent = 'LOADING SPRITES...';
    loadMsg.id = 'load-msg';
    document.body.appendChild(loadMsg);
    const check = setInterval(() => {
      if (spritesReady >= 2) {
        clearInterval(check);
        document.getElementById('load-msg')?.remove();
        _doStartGame();
      }
    }, 100);
    return;
  }
  _doStartGame();
}
function _doStartGame() {
  titleVisible = false;
  document.getElementById('title-screen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('pause-btn').style.display = 'flex';
    gameState = 'playing';
    updateHUD();
    updateHealthBar();
    gameLoop();
  }, 800);
}

// ========== BRIDGE CODE (connects UI to game) ==========
// This connects the Start Button to the game logic
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  startGame();
});

// This handles the mobile D-Pad and Action Buttons
document.querySelectorAll('#mobile-controls button').forEach(btn => {
  const handle = (isDown) => {
    if (paused) return;
    const key = btn.getAttribute('data-key');
    keys[key] = isDown;
    if (isDown) btn.classList.add('pressed');
    else btn.classList.remove('pressed');

    if (isDown && gameState === 'playing' && !player.attacking) {
      if (key === 'KeyZ') { player.attacking = true; player.attackType = 'punch'; player.attackFrame = 0; }
      if (key === 'KeyX') { player.attacking = true; player.attackType = 'kick'; player.attackFrame = 0; }
      if (key === 'KeyC') { player.attacking = true; player.attackType = 'special'; player.attackFrame = 0; }
      if (key === 'ArrowUp' && player.grounded) { player.vy = -12; player.grounded = false; }
    }
  };
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); handle(true); }, { passive: false });
  btn.addEventListener('touchend',   (e) => { e.preventDefault(); handle(false); }, { passive: false });
  btn.addEventListener('touchcancel',(e) => { e.preventDefault(); handle(false); }, { passive: false });
});

// Also support keyboard for desktop testing
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') { togglePause(); }
  if (gameState === 'playing' && !paused) {
    if (e.key === 'z' || e.key === 'Z') { player.attacking = true; player.attackType = 'punch'; player.attackFrame = 0; }
    if (e.key === 'x' || e.key === 'X') { player.attacking = true; player.attackType = 'kick'; player.attackFrame = 0; }
    if (e.key === 'c' || e.key === 'C') { player.attacking = true; player.attackType = 'special'; player.attackFrame = 0; }
    if ((e.key === 'ArrowUp' || e.key === ' ') && player.grounded) { player.vy = -12; player.grounded = false; }
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// INITIALIZE START BUTTON
const startBtn = document.getElementById('start-btn');
if (startBtn) {
  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startGame();
  }, { passive: false });
}

// Initialize HUD values
updateHUD();
</script>
</body>
