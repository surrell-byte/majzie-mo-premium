<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Super Majzie Mo - Final Cut</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="title-mode">

  <canvas id="gameCanvas"></canvas>

  <div id="title-screen">
    <div id="title-bg"></div>
    <div class="title-main">
      <span>MAJZIE</span>
      <span>MO</span>
    </div>
    <button id="start-btn">START GAME</button>
  </div>

  <div id="hud" style="display:none;">
    <div class="health-container">
      <div id="health-bar"></div>
    </div>
    <div id="score-display">SCORE: 0</div>
  </div>

  <div id="mobile-controls">
    <div class="dpad">
      <button data-key="ArrowLeft" aria-label="Left">⬅️</button>
      <button data-key="ArrowRight" aria-label="Right">➡️</button>
      <button data-key="ArrowUp" aria-label="Jump">⬆️</button>
    </div>

    <div class="actions">
      <button data-key="KeyZ" aria-label="Punch">👊</button>
      <button data-key="KeyX" aria-label="Kick">💥</button>
      <button data-key="KeyC" aria-label="Special">⚡</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
